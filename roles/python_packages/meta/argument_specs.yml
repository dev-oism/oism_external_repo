---
# argument spec file for oism.external_repo.python_packages

argument_specs:
  main:
    short_description: Argument specification for the python_packages role.
    options:
      python_packages_dest_dir:
        type: str
        description: Destination directory where the tarball and log file are written.
        default: "/srv/repos"
      python_packages_download_dir:
        type: str
        description: Directory where pip downloads the Python packages before archiving.
        default: "/tmp/python_packages"
      python_packages_tar_name:
        type: str
        description: Name of the generated tarball containing downloaded Python packages.
        default: "python-packages.tar.gz"
      python_packages_list:
        type: list
        description: List of Python package names to download with pip.
        elements: str
        default:
          - ansible
          - ansible-dev-tools
          - ansible-lint
          - antsibull-changelog
          - antsibull-build
          - antsibull-docs
      python_packages_my_variable:
        type: str
        description: Example variable included for backward compatibility and demonstration.
        default: "default_value"
